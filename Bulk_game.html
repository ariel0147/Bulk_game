<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משחק תפזורת - מילים ואתגרים</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="Bulk_game.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div class="game-container">
    <h1>תפזורת מילים</h1>

    <div class="controls-container">
        <select id="category-select" class="neon-select">
            <option value="programming">תכנות ומטריקס</option>
            <option value="anime">אנימה ופנטזיה</option>
            <option value="cars">רכבים ומוטוריקה</option>
            <option value="gaming">גיימינג ו-E-Sports</option>
            <option value="food">אוכל ומסעדות</option>
            <option value="animals">עולם החי</option>
        </select>
        <button id="new-game-btn" class="neon-btn">התחל משחק</button>
        <button id="hint-btn" class="neon-btn hint-btn hidden">💡 רמז (-20 ש')</button>
    </div>

    <div id="game-area" class="hidden">
        <div class="stats-container">
            <div class="stat-box">זמן: <span id="timer">03:00</span></div>
            <div class="stat-box strikes-box">פסילות: <span id="strikes">0/3</span></div>
            <div class="stat-box">ניקוד: <span id="score">0</span></div>
            <div class="stat-box" style="color:#FFD700; border-color:#FFD700;">שיא: <span id="high-score">0</span></div>
        </div>

        <div id="grid" class="grid"></div>
        <div id="word-list" class="word-list"></div>
    </div>
</div>

<div id="victory-modal" class="modal hidden">
    <div class="modal-content">
        <h2>🏆 כול הכבוד! 🏆</h2>
        <p>סיימת את כל המילים!</p>
        <p>ניקוד סופי: <span id="final-score" style="color: #00FFAA; font-weight: bold; font-size: 24px;">0</span></p>
        <p id="new-record-msg" class="hidden">🎉 שיא חדש! 🎉</p>
        <div class="modal-buttons">
            <button id="play-again-btn" class="neon-btn">שחק שוב</button>
            <button id="share-wa-victory" class="neon-btn wa-btn">שתף בוואטסאפ 🟢</button>
        </div>
    </div>
</div>

<div id="game-over-modal" class="modal hidden">
    <div class="modal-content" style="border-color: #FF0055; box-shadow: 0 0 30px rgba(255, 0, 85, 0.4);">
        <h2 style="color: #FF0055; text-shadow: 0 0 10px #FF0055;">⏳ נגמר הזמן! ⏳</h2>
        <p>הזמן עבר והמשחק הסתיים.</p>
        <p>ניקוד סופי: <span id="game-over-score" style="color: #00FFAA; font-weight: bold; font-size: 24px;">0</span></p>
        <div class="modal-buttons">
            <button id="game-over-play-again-btn" class="neon-btn" style="border-color: #FF0055; color: #FF0055; box-shadow: 0 0 15px rgba(255,0,85,0.3);">שחק שוב</button>
            <button id="share-wa-gameover" class="neon-btn wa-btn">שתף תוצאה בוואטסאפ 🟢</button>
        </div>
    </div>
</div>

<script src="Bulk_game.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('Service Worker רשום בהצלחה'))
                .catch(err => console.log('שגיאה ברישום Service Worker', err));
        });
    }
</script>
</body>
</html>
